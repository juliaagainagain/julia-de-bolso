<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mac-window">
        <header class="mac-titlebar">
            <div class="mac-buttons">
                <div class="mac-btn red"></div>
                <div class="mac-btn yellow"></div>
                <div class="mac-btn green"></div>
            </div>
            <span class="mac-title">Home</span>
        </header>

        <div class="mac-container">
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3 class="sidebar-label">Favoritos</h3>
                    <nav class="sidebar-nav">
                        <a href="home.html" class="sidebar-item active">
                            <span class="sidebar-icon" aria-hidden="true"><img class="sidebar-icon-img" src="https://img.icons8.com/ios/50/home--v1.png" alt=""></span>
                            <span>Home</span>
                        </a>
                        <a href="galeria.html" class="sidebar-item">
                            <span class="sidebar-icon" aria-hidden="true"><img class="sidebar-icon-img" src="imagens/galeria.png" alt=""></span>
                            <span>Galeria</span>
                        </a>
                        <a href="notas.html" class="sidebar-item">
                            <span class="sidebar-icon" aria-hidden="true"><img class="sidebar-icon-img" src="imagens/notas.png" alt=""></span>
                            <span>Notas</span>
                        </a>
                        <a href="musicas.html" class="sidebar-item">
                            <span class="sidebar-icon" aria-hidden="true"><img class="sidebar-icon-img" src="imagens/icone-musica.png" alt=""></span>
                            <span>Músicas</span>
                        </a>
                    </nav>
                </div>
            </aside>

            <main class="main-content page-content home-profile-page">
                <section class="home-profile-wrap">
                    <article class="profile-card">
                        <div class="profile-cover"></div>

                        <div class="profile-main">
                            <img class="profile-avatar" src="imagens/perfil.jpg" alt="Foto de perfil">

                            <div class="profile-text">
                                <h1>★</h1>
                                
                            </div>
                        </div>

                        <div class="profile-social" aria-label="Minhas redes sociais">
                            
                            <a class="social-link" href="https://www.instagram.com/juliamichetti/" target="_blank" rel="noopener noreferrer" aria-label="Instagram" title="Instagram">
                                <img class="social-link-icon" src="https://img.icons8.com/ios-filled/50/instagram-new--v1.png" alt="Instagram">
                            </a>
                            <a class="social-link" href="https://www.tiktok.com/@juliaagainagain" target="_blank" rel="noopener noreferrer" aria-label="TikTok" title="TikTok">
                                <img class="social-link-icon" src="https://img.icons8.com/ios-filled/50/tiktok--v1.png" alt="TikTok">
                            </a>
                            <a class="social-link" href="https://pin.it/3hjICkl2b" target="_blank" rel="noopener noreferrer" aria-label="Pinterest" title="Pinterest">
                                <img class="social-link-icon" src="https://img.icons8.com/ios-filled/50/pinterest--v1.png" alt="Pinterest">
                            </a>
                        </div>

                      

                        
                    </article>
                </section>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
